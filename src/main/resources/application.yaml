spring:
  application:
    name: prymage-product
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-base64-or-plain-secret-with-at-least-32-bytes}
    expiry-ms: ${JWT_EXPIRY_MS:86400000}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  seed:
    admin:
      email: ${SEED_ADMIN_EMAIL:admin@prymage.com}
      password: ${SEED_ADMIN_PASSWORD:ChangeMe123}
      name: ${SEED_ADMIN_NAME:Prymage Admin}

management:
  endpoints:
    web:
      exposure:
        include: health

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prymage}}
    username: ${DB_USERNAME:${DB_USER:postgres}}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:prymage}}
    username: ${DB_USERNAME:${DB_USER:postgres}}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: ${DB_MIN_IDLE:5}
      data-source-properties:
        sslmode: ${DB_SSL_MODE:require}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
